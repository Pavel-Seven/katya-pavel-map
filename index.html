<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Паша & Катя 💍</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Паша & Катя 💍">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
    <style>
        body {
            background-color: #2a2b35;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .emoji {
            font-size: 80px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 32px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 18px;
            color: #a1a1aa;
            margin-bottom: 5px;
        }
        .date {
            font-size: 14px;
            color: #4dbd7a;
            margin-bottom: 40px;
            font-weight: 600;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .badge {
            margin-top: 50px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-size: 12px;
            color: #a1a1aa;
        }
    </style>
</head>
<body>

    <div class="emoji">💍</div>
    <h1>Паша & Катя</h1>
    <div class="subtitle">Карта нашего будущего</div>
    <div class="date">19 июня 2026</div>

    <a href="katya_mobile_v2.html" class="btn">📱 Открыть мобильную версию</a>
    <a href="map.html" class="btn">🗺️ Открыть карту (десктоп)</a>

    <div class="badge">
        Последнее обновление: <span id="updated"></span>
    </div>

    <script>
        document.getElementById('updated').textContent =
            new Date().toLocaleDateString('ru-RU', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
    </script>

</body>
</html>
